<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Your Name — Links</title>
        <!--
            Personal Link-in-Bio Page
            - Single HTML file (CSS inside <style>)
            - Mobile-first, responsive, no JavaScript
            How to customize:
                1) Replace "Your Name" and the tagline.
                2) Update the links (text + href).
                3) Swap the SVG avatar for your photo (<img src="path/to.jpg" />).
                4) Tweak colors via the CSS variables in :root.
        -->
        <style>
            /* ====== Design Tokens (easy to customize) ====== */
            :root {
                /* Background gradient (soft & friendly) */
                --bg-start: #f8fbff;
                --bg-end: #f4f9ff;

                /* Card + text */
                --card-bg: #ffffff;
                --text: #1f2937; /* slate-800 */
                --muted: #6b7280; /* slate-500 */

                /* Buttons */
                --button-bg: #f3f4f6; /* slate-100 */
                --button-border: #e5e7eb; /* slate-200 */
                --button-hover-bg: #e5e7eb; /* slate-200 */
                --primary: #2563eb; /* blue-600 */
                --primary-hover: #1e40af; /* blue-800 */

                /* Shadows */
                --shadow-card: 0 8px 24px rgba(31, 41, 55, 0.12);
                --shadow-hover: 0 6px 16px rgba(31, 41, 55, 0.16);
            }

            /* ====== Base ====== */
            html, body { height: 100%; }
            body {
                margin: 0;
                padding: 24px; /* mobile-friendly breathing room */
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif,
                    "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
                color: var(--text);
                background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* ====== Card ====== */
            .card {
                width: 100%;
                max-width: 560px; /* comfortably narrow on desktop */
                background: var(--card-bg);
                border-radius: 20px;
                box-shadow: var(--shadow-card);
                padding: 24px;
            }

            @media (min-width: 480px) {
                .card { padding: 28px; }
            }

            /* ====== Profile section ====== */
            .profile {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 14px;
            }

            .avatar {
                width: 112px;
                height: 112px;
                border-radius: 50%; /* circular */
                overflow: hidden;
                box-shadow: 0 4px 12px rgba(31, 41, 55, 0.12);
            }

            .name {
                font-size: 1.6rem;
                font-weight: 700;
                letter-spacing: 0.2px;
                margin: 0.25rem 0 0; /* subtle tighten */
            }

            .tagline {
                color: var(--muted);
                font-size: 0.95rem;
                margin: 0;
            }

            /* ====== Links section ====== */
            .links {
                margin-top: 18px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .link-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                padding: 14px 16px;
                border-radius: 12px;
                text-decoration: none;
                color: var(--text);
                background: var(--button-bg);
                border: 1px solid var(--button-border);
                transition:
                    background-color 160ms ease,
                    box-shadow 160ms ease,
                    transform 160ms ease;
            }

            .link-btn:hover {
                background: var(--button-hover-bg);
                box-shadow: var(--shadow-hover);
                transform: translateY(-1px);
            }

            .link-btn:active {
                transform: translateY(0);
                box-shadow: none;
            }

            .link-btn.primary {
                background: var(--primary);
                color: #ffffff;
                border-color: transparent;
            }

            .link-btn.primary:hover {
                background: var(--primary-hover);
            }

            /* ====== Footer ====== */
            footer {
                margin-top: 18px;
                text-align: center;
                color: var(--muted);
                font-size: 0.85rem;
            }

            /* ====== Accessibility helpers ====== */
            .visually-hidden {
                position: absolute;
                width: 1px; height: 1px;
                padding: 0; margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                border: 0;
            }
        </style>
    </head>
    <body>
        <main class="card" role="main" aria-label="Profile links">
            <section class="profile" aria-label="Profile">
                <!-- Avatar: replace the SVG below with <img src="your-photo.jpg" alt="Your Name" /> -->
                <div class="avatar" aria-hidden="true">
                    <!-- Simple inline SVG placeholder (self-contained, no external files) -->
                    <svg width="112" height="112" viewBox="0 0 112 112" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <defs>
                            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#a7f3d0" />
                                <stop offset="1" stop-color="#93c5fd" />
                            </linearGradient>
                        </defs>
                        <rect width="112" height="112" rx="56" fill="url(#g)" />
                        <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" font-size="38" font-family="Segoe UI, Roboto, Arial, sans-serif" fill="#ffffff" opacity="0.9">U</text>
                    </svg>
                </div>

                <!-- Edit your name -->
                <h1 class="name">Your Name</h1>
                <!-- Keep to one line: role or short personal tagline -->
                <p class="tagline">Designer • Traveler • Learner</p>
            </section>

            <section class="links" aria-label="Links">
                <!-- Update text + href to your destinations. Consider one "primary" CTA. -->
                <a class="link-btn primary" href="https://example.com" target="_blank" rel="noopener">Visit My Website</a>
                <a class="link-btn" href="https://example.com" target="_blank" rel="noopener">Instagram</a>
                <a class="link-btn" href="https://example.com" target="_blank" rel="noopener">LinkedIn</a>
                <a class="link-btn" href="https://example.com" target="_blank" rel="noopener">GitHub</a>
                <a class="link-btn" href="https://example.com" target="_blank" rel="noopener">Twitter / X</a>
                <a class="link-btn" href="mailto:you@example.com">Email Me</a>
            </section>

            <footer>
                <!-- Muted footer text -->
                <small>Made by me • © 2025</small>
            </footer>
        </main>
    </body>
</html>
